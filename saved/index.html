<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>哈哈狗報｜Saved</title>
  <style>
    :root{--bg:#020617;--card:#0f172a;--text:#e5eefc;--muted:#94a3b8;--line:#1e293b;--accent:#7dd3fc;--soft:#082f49;--good:#86efac}
    *{box-sizing:border-box} html{font-size:18px} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;line-height:1.75}
    .wrap{max-width:760px;margin:0 auto;padding:20px 14px 48px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px 18px;box-shadow:0 12px 32px rgba(0,0,0,.35);margin-bottom:14px}
    h1,h2{margin:0 0 10px} a{color:var(--accent);text-decoration:none}.muted{color:var(--muted)} .pill{display:inline-block;padding:6px 12px;border-radius:999px;background:var(--soft);color:var(--accent);font-weight:700;font-size:.95rem}
  
.save-btn{appearance:none;border:1px solid rgba(125,211,252,.35);background:rgba(125,211,252,.08);color:var(--accent);border-radius:999px;padding:8px 12px;font:inherit;font-size:.92rem;font-weight:700;cursor:pointer;line-height:1.1}
.save-btn[data-saved="true"]{background:rgba(134,239,172,.12);border-color:rgba(134,239,172,.45);color:var(--good)}
.story-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}.saved-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.saved-tag,.saved-date{display:inline-block;padding:4px 10px;border:1px solid var(--line);border-radius:999px;font-size:.85rem;color:var(--muted);background:rgba(125,211,252,.05)}
</style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="pill"><a href="../">← 回首頁</a></div>
      <h1>Saved</h1>
      <p>這裡只收錄你<strong>手動指定收藏</strong>的新聞。現在每篇報導都可以直接按 <strong>加入 Saved</strong> 收藏，資料會先存你這台裝置的瀏覽器。</p>
      <p class="muted">每則收藏會保留：標題、日期、主題、摘要、來源連結、站內定位連結。若你換裝置或清除瀏覽器資料，收藏會一起消失。</p>
    </section>
    <section class="card">
      <h2>我的收藏</h2>
      <p class="muted">點各篇新聞上的 <strong>加入 Saved</strong> 就會出現在這裡；再按一次可取消。</p>
      <div data-saved-empty>目前還沒有已收藏的新聞，先去其他頁面存幾篇吧。</div>
      <div data-saved-list></div>
    </section>
  </main>

<script src="../assets/saved.js"></script>
</body>
</html>
