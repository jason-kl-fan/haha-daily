<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>哈哈狗報｜Saved</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#dbe3ef;--accent:#2563eb;--soft:#eef4ff}
    *{box-sizing:border-box} html{font-size:18px} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;line-height:1.75}
    .wrap{max-width:760px;margin:0 auto;padding:20px 14px 48px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px 18px;box-shadow:0 8px 24px rgba(0,0,0,.05);margin-bottom:14px}
    h1,h2{margin:0 0 10px} a{color:var(--accent);text-decoration:none}.muted{color:var(--muted)} .pill{display:inline-block;padding:6px 12px;border-radius:999px;background:var(--soft);color:var(--accent);font-weight:700;font-size:.95rem}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="pill"><a href="../">← 回首頁</a></div>
      <h1>Saved</h1>
      <p>這裡只收錄你<strong>手動指定收藏</strong>的新聞。系統不會自動把任何新聞標成重要，只有你叫我存，我才會放進來。</p>
      <p class="muted">之後每則收藏會保留：標題、日期、主題、摘要、來源連結、站內頁連結。</p>
    </section>
    <section class="card">
      <h2>目前狀態</h2>
      <p>目前還沒有已收藏的新聞。等你之後指定要收藏哪篇，我就會更新這一頁。</p>
    </section>
  </main>
</body>
</html>
