<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>哈哈狗報</title>
  <style>
:root{--bg:#020617;--card:#0f172a;--text:#e5eefc;--muted:#94a3b8;--line:#1e293b;--accent:#7dd3fc;--soft:#082f49;--good:#86efac}
*{box-sizing:border-box} html{font-size:18px} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;line-height:1.72}
a{color:var(--accent);text-decoration:none} strong{font-weight:800}
.wrap{max-width:900px;margin:0 auto;padding:20px 14px 52px}.narrow{max-width:760px}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px 18px;box-shadow:0 12px 32px rgba(0,0,0,.35);margin-bottom:14px}
.pill{display:inline-block;padding:6px 12px;border-radius:999px;background:var(--soft);color:var(--accent);font-weight:700;font-size:.95rem}.muted{color:var(--muted)}
h1,h2,h3{margin:0 0 10px;line-height:1.25} h1{font-size:1.8rem} h2{font-size:1.35rem} h3{font-size:1.06rem}
p{margin:.45em 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.topic-card{display:block;color:inherit;text-decoration:none;border:1px solid var(--line);border-radius:16px;padding:16px;background:rgba(125,211,252,.05)}
.topic-card h3{color:var(--accent);margin-bottom:4px}
@media (max-width:720px){html{font-size:17px}.wrap{padding:16px 12px 40px}.card{border-radius:18px;padding:16px 14px}}
</style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>哈哈狗報</h1>
      <p>每日精選資訊門戶</p>
    </section>
    <section class="card">
      <h2>最新一期</h2>
      <p><a href="2026-03-17/"><strong>2026 年 3 月 17 日</strong> · 哈哈狗報 →</a></p>
      <div class="grid">
        <a href="startup/" class="topic-card">
          <h3>🚀 Startup</h3>
          <p class="small">新創融資、產品、合作、轉型與併購。</p>
        </a>
      </div>
    </section>
    <section class="card">
      <h2>過往期數</h2>
      <ul>
        <li><a href="2026-03-17/">2026 年 3 月 17 日</a></li>
        <li><a href="2026-03-16/">2026 年 3 月 16 日</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
