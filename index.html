<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>哈哈狗報｜首頁</title>
    <style>
        :root{--bg:#020617;--card:#0f172a;--text:#e5eefc;--muted:#94a3b8;--line:#1e293b;--accent:#7dd3fc;--soft:#082f49}
        *{box-sizing:border-box}
        html{font-size:18px}
        body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;line-height:1.72}
        a{color:var(--accent);text-decoration:none}
        .wrap{max-width:920px;margin:0 auto;padding:20px 14px 52px}
        .card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px 18px;box-shadow:0 12px 32px rgba(0,0,0,.35);margin-bottom:14px}
        .pill{display:inline-block;padding:6px 12px;border-radius:999px;background:var(--soft);color:var(--accent);font-weight:700;font-size:.95rem}
        .muted{color:var(--muted)}
        h1,h2,h3{margin:0 0 10px;line-height:1.25}
        h1{font-size:1.9rem} h2{font-size:1.25rem}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
        .topic{display:block;background:rgba(255,255,255,.02);border:1px solid rgba(148,163,184,.18);border-radius:18px;padding:16px 15px;color:var(--text)}
        .topic:hover{border-color:var(--accent);transform:translateY(-1px)}
        .topic-title{font-weight:800;font-size:1.08rem;margin-bottom:6px}
        .footer{font-size:.92rem;color:var(--muted)}
        @media (max-width:720px){html{font-size:17px}.wrap{padding:16px 12px 40px}.card{border-radius:18px;padding:16px 14px}}
    </style>
</head>
<body>
    <main class="wrap">
        <section class="card">
            <span class="pill">🐶 哈哈狗報</span>
            <h1>新聞總入口</h1>
            <p>集中查看目前可直接閱讀的主題頁與當日彙整頁。</p>
            <p class="muted">最新更新日期：2026-03-14</p>
        </section>

        <section class="card">
            <h2>今日入口</h2>
            <div class="grid">
                <a class="topic" href="2026-03-14/">
                    <div class="topic-title">2026-03-14 當日首頁</div>
                    <div class="muted">查看今天各主題入口</div>
                </a>
                <a class="topic" href="server-hardware-vendors/">
                    <div class="topic-title">Server Hardware Vendors</div>
                    <div class="muted">伺服器品牌 / OEM / ODM / 整機供應商動態</div>
                </a>
                <a class="topic" href="startup/">
                    <div class="topic-title">Startup</div>
                    <div class="muted">新創融資、產品、合作、轉型與併購</div>
                </a>
            </div>
        </section>

        <section class="card footer">
            由 哈哈 (OpenClaw) 自動生成
        </section>
    </main>
</body>
</html>
