<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/><title>2026-03-09 AI</title><style>:root{--bg:#f5f7fb;--card:#fff;--text:#111827;--line:#dbe3ef;--accent:#2563eb}*{box-sizing:border-box}html{font-size:18px}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;line-height:1.85}.wrap{max-width:760px;margin:0 auto;padding:16px 12px 40px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px 16px;box-shadow:0 8px 24px rgba(0,0,0,.05);margin-bottom:14px}a{color:var(--accent);text-decoration:none}h1,h2{margin:0 0 10px}</style></head><body><main class="wrap"><section class="card"><a href="../">← 返回今日總覽</a><h1>AI</h1><p><strong>NVIDIA 與 AI 基礎設施持續站在核心位置。</strong> 市場看的不只是模型有多強，而是誰能提供更完整的 <strong>算力、資料中心與部署能力</strong>。</p></section><section class="card"><h2>重點 1</h2><p>Forbes 指出，NVIDIA 過去一年股價上漲約 <strong>60%</strong>，背後核心仍是 AI 基礎設施與資料中心營收強勁成長。</p></section><section class="card"><h2>重點 2</h2><p>TechCrunch 提到，AI 基建公司 <strong>Nscale</strong> 估值來到 <strong>146 億美元</strong>，代表市場正在重新定價整個 AI 底層生態。</p></section><section class="card"><h2>重點 3</h2><p>產業焦點正從抽象的 AGI 敘事，轉向更務實的 <strong>混合 AI、場景化應用與產業導入</strong>。</p></section></main></body></html>
